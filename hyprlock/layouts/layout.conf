############################
# INPUT FIELD (MINIMAL)
############################
input-field {
    monitor =
    size = 320, 52
    rounding = 26

    inner_color = rgba(255, 255, 255, 0.10)
    outer_color = rgba(255, 255, 255, 0.18)

    font_family = $font
    font_color = rgba(205, 214, 244, 0.9)

    placeholder_text =  unlock

    halign = center
    valign = bottom
    position = 0, 160
}
