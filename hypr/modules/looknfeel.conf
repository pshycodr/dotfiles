#####################
### LOOK AND FEEL  ###
#####################

# Philosophy: Fast & Cinematic — neutral palette.
# Motion has director's intent. Every transition is a cut, a push, or a dissolve.
# Windows don't just open — they enter the frame.
# The wallpaper is always the backdrop. Decoration stays out of its way.
# Fast enough to never feel slow. Deliberate enough to never feel cheap.

# ── General ───────────────────────────────────────────────────────────────────

general {
    gaps_in  = 7
    gaps_out = 14

    border_size = 1

    # Near-invisible borders — let content and shadow define the window edge
    col.active_border   = $active_border
    col.inactive_border = $inactive_border

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

# ── Decoration ────────────────────────────────────────────────────────────────

decoration {
    rounding       = 8           # Subtle — cinematic UIs have restrained curves
    rounding_power = 3

    active_opacity   = 1.0       # Active window: fully present, in focus
    inactive_opacity = 0.96      # Inactive: barely pulled back — like rack focus

    dim_inactive = true
    dim_strength = 0.10          # Gentle rack-focus effect — bg recedes, fg pops

    shadow {
        enabled        = true
        range          = 25          # Cinematic depth — shadow gives the Z axis
        render_power   = 3
        offset         = 0, 5        # Downward — like a key light from above
        color          = rgba(00000045)
        color_inactive = rgba(00000022)
    }

    blur {
        enabled            = true
        size               = 6          # Light blur — wallpaper detail stays intact
        passes             = 2          # Fast, efficient
        noise              = 0.03       # Film grain — gives it texture, not sterility
        contrast           = 1.05       # Slight punch — like a rec709 grade
        brightness         = 1.0
        vibrancy           = 0.0        # Zero vibrancy — wallpaper colors stay pure
        ignore_opacity     = true
        new_optimizations  = true
        popups             = true
        popups_ignorealpha = 0.2
        special            = false
    }
}

# ── Animations ────────────────────────────────────────────────────────────────
#
# Cinematic motion vocabulary:
#   - "Cut"    → near-instant, no easing — used for fades and exits
#   - "Push"   → fast ease-out slide — the camera pushing into a scene
#   - "Pull"   → sharp exit — scene cutting away
#   - "Lens"   → smooth weighted open — like a lens pulling focus
#
# Rule: entrances are slightly slower than exits.
# In film, you linger on arrival. You cut away fast.

animations {
    enabled = yes

    # ── Bezier curves ──────────────────────────────────────────────────────

    # lens   → weighted, smooth settle — window entering the frame
    # push   → fast ease-out — scene pushing forward
    # pull   → hard acceleration out — fast cut away
    # cut    → near-linear, minimal easing — instant feel for fades

    bezier = lens, 0.22, 1.0,  0.36, 1.0
    bezier = push, 0.25, 1.0,  0.5,  1.0
    bezier = pull, 0.6,  0.0,  0.8,  0.45
    bezier = cut,  0.4,  0.0,  0.6,  1.0

    # ── Windows ────────────────────────────────────────────────────────────

    animation = windows,     1, 3, push,  slide

    # Enter the frame from 90% — not a pop, a push-in
    animation = windowsIn,   1, 4, lens,  popin 90%

    # Cut away fast — exits should never linger
    animation = windowsOut,  1, 2, pull,  popin 90%

    # Repositioning feels like a quick camera pan
    animation = windowsMove, 1, 3, push

    # ── Borders ────────────────────────────────────────────────────────────

    animation = border,      1, 5, push
    animation = borderangle, 1, 50, push, loop

    # ── Fades ──────────────────────────────────────────────────────────────

    # Fast dissolves — cinematic cuts are fast, not slow cross-fades
    animation = fade,    1, 3, cut
    animation = fadeIn,  1, 3, lens
    animation = fadeOut, 1, 2, pull

    # ── Layers (rofi, waybar, swaync, etc) ────────────────────────────────

    # Panels push in from the edge like a lower-third
    animation = layers,    1, 3, push,  slide
    animation = layersIn,  1, 3, lens,  slide
    animation = layersOut, 1, 2, pull,  slide

    # ── Workspaces ─────────────────────────────────────────────────────────

    # Scene change — fast directional push, like a hard cut with motion
    animation = workspaces,    1, 4, push, slide
    animation = workspacesIn,  1, 4, lens, slide
    animation = workspacesOut, 1, 3, pull, slide

    # ── Zoom ───────────────────────────────────────────────────────────────

    animation = zoomFactor, 1, 4, lens
}

# ── Layouts ───────────────────────────────────────────────────────────────────

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

# ── Misc ──────────────────────────────────────────────────────────────────────

misc {
    force_default_wallpaper      = -1
    disable_hyprland_logo        = false
    vfr                          = true
    vrr                          = 0
    focus_on_activate            = true
    animate_manual_resizes       = false
    animate_mouse_windowdragging = false
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
}
