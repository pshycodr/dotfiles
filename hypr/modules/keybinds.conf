###################
### KEYBINDINGS  ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

$mainMod = ALT # Sets "Alt" key as main modifier

# ── Core Apps ─────────────────────────────────────────────────────────────────

# Launch terminal
bind = $mainMod, Q, exec, $terminal

# Kill focused window
bind = $mainMod, BACKSPACE, killactive,

# Launch file manager
bind = $mainMod, E, exec, $fileManager

# Toggle floating for focused window
bind = $mainMod, V, togglefloating,

# Open app launcher (rofi)
bind = CTRL SHIFT, SPACE, exec, $menu

# Toggle dwindle pseudotiling
bind = $mainMod, P, pseudo, # dwindle

# Toggle dwindle split orientation
bind = $mainMod, J, togglesplit, # dwindle

# Open browser
bind = $mainMod, B, exec, $browser

# ── Focus Movement ────────────────────────────────────────────────────────────

# Move focus with arrow keys
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── Workspaces ────────────────────────────────────────────────────────────────

# Switch to workspace N
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace N
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Toggle scratchpad (special workspace)
bind = $mainMod,       S, togglespecialworkspace, magic
# Move active window to scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mouse wheel
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Mouse Window Management ───────────────────────────────────────────────────

# Drag to move a window
bindm = $mainMod, mouse:272, movewindow
# Drag to resize a window
bindm = $mainMod, mouse:273, resizewindow

# ── Audio ─────────────────────────────────────────────────────────────────────

# Raise output volume (up to 200% via pamixer boost)
binde = , XF86AudioRaiseVolume, exec, pamixer --increase 5 --allow-boost 100 --set-limit 200
# Lower output volume
binde = , XF86AudioLowerVolume, exec, pamixer --decrease 5 --allow-boost 100
# Toggle output mute
bind  = , XF86AudioMute,        exec, pamixer --toggle-mute
# Toggle microphone mute
bindel = , XF86AudioMicMute,    exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Media Playback ────────────────────────────────────────────────────────────

# Skip to next track
bindl = , XF86AudioNext,  exec, playerctl next
# Toggle play / pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
# Go to previous track
bindl = , XF86AudioPrev,  exec, playerctl previous

# ── Brightness ────────────────────────────────────────────────────────────────

# Increase screen brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
# Decrease screen brightness
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ── Screenshots ───────────────────────────────────────────────────────────────

# Capture full screen → open in satty
bind = CTRL,       Print,       exec, ~/.config/screenshot/screenshot-satty.sh output
# Capture selected region → open in satty
bind = $mainMod,   Print,       exec, ~/.config/screenshot/screenshot-satty.sh region
# Capture focused window → open in satty
bind = CTRL SHIFT, Print,       exec, ~/.config/screenshot/screenshot-satty.sh window

# ── Utilities ─────────────────────────────────────────────────────────────────

# Pick a color from screen and copy hex to clipboard
bind = SUPER SHIFT, C, exec, hyprpicker | wl-copy

# Toggle swaync notification center
bind = $mainMod, N, exec, swaync-client -t

# Reload / relaunch waybar
bind = $mainMod SHIFT, W, exec, ~/.config/waybar/scripts/launch.sh

# Open power menu (rofi)
bind = SUPER, x, exec, ~/.config/rofi/powermenu/powermenu.sh

# Lock the screen
bind = Super, L, exec, $HOME/.config/hyprlock/scripts/hyprlock.sh

# Open clipboard history (copyq GUI)
bind = SUPER, v, exec, copyq toggle

# Open wallpaper picker
bind = $mainMod SHIFT, T, exec, ~/.config/dotfiles/rofi/scripts/wallpaper.sh

# ── Window Switcher ───────────────────────────────────────────────────────────

# Cycle to next window (Alt+Tab)
bind = ALT,       Tab,       exec, snappy-switcher next
# Cycle to previous window (Alt+Shift+Tab)
bind = ALT SHIFT, Tab,       exec, snappy-switcher prev
