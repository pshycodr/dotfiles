# Font
font_family GeistMono Nerd Font Mono
font_size 15

disable_ligatures no

shell zsh
shell_integration disabled

url_style curly

# Dynamic wallpaper-based colors (generated by theme/render.sh)
include colors.conf

# Transparency for blur effect
background_opacity 0.85

# Slight fade for inactive windows
inactive_text_alpha 0.5


# Window
window_padding_width 12
window_margin_width 0
confirm_os_window_close 0

# Performance
repaint_delay 10
input_delay 0
sync_to_monitor no

# # Scrolling
# scrollback_lines 10000 no
